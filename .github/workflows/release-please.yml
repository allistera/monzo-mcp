name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  dxt:
    name: Build and attach DXT bundle
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install (with dev deps)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Stage DXT bundle
        run: |
          mkdir -p .dxt-build
          cp manifest.json package.json README.md LICENSE .dxt-build/
          cp -R dist node_modules .dxt-build/

      - name: Package DXT
        run: |
          cd .dxt-build
          zip -r "../monzo-mcp-${{ needs.release-please.outputs.tag_name }}.dxt" .

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "monzo-mcp-${{ needs.release-please.outputs.tag_name }}.dxt" \
            --repo "${{ github.repository }}" --clobber
